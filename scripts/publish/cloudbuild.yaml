steps:
  # Decrypt the npm credentials.
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      [
        'kms',
        'decrypt',
        '--ciphertext-file=npmrc.enc',
        '--plaintext-file=npmrc',
        '--location=global',
        '--keyring=${_KEY_RING}',
        '--key=${_KEY_NAME}',
      ]

  # Clone the repository using the GitHub PAT from Secret Manager.
  - name: 'gcr.io/cloud-builders/git'
    entrypoint: 'bash'
    args:
      - '-c'
      - 'git clone https://x-access-token:$$GITHUB_TOKEN@github.com/${_REPOSITORY_ORG}/${_REPOSITORY_NAME}.git'
    secretEnv: ['GITHUB_TOKEN']

  # Set up the Git configuration.
  - name: 'gcr.io/cloud-builders/git'
    dir: '${_REPOSITORY_NAME}'
    args: ['config', '--global', 'user.email', 'firebase-oss-bot@google.com']
  - name: 'gcr.io/cloud-builders/git'
    dir: '${_REPOSITORY_NAME}'
    args: ['config', '--global', 'user.name', 'Google Open Source Bot']

  # Set up the npm credentials.
  - name: 'gcr.io/$PROJECT_ID/fft-package-builder'
    entrypoint: 'bash'
    args: ['-c', 'cp -v npmrc ~/.npmrc']

  # Publish the package.
  - name: 'gcr.io/$PROJECT_ID/fft-package-builder'
    dir: '${_REPOSITORY_NAME}'
    args: ['bash', './scripts/publish.sh', '${_VERSION}']
    secretEnv: ['GITHUB_TOKEN']
    env:
      - 'REPOSITORY_ORG=${_REPOSITORY_ORG}'
      - 'REPOSITORY_NAME=${_REPOSITORY_NAME}'
      - 'DRY_RUN=${_DRY_RUN}'

substitutions:
  _VERSION: ''
  _DRY_RUN: ''
  _KEY_RING: 'npm-publish-keyring'
  _KEY_NAME: 'publish'
  _REPOSITORY_ORG: 'firebase'
  _REPOSITORY_NAME: 'firebase-functions-test'

availableSecrets:
  secretManager:
    - versionName: projects/firebase-functions-publishing/secrets/firebase-functions-github-pat/versions/latest
      env: 'GITHUB_TOKEN'
